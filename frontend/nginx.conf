# Serve the React SPA with correct caching so new deploys show up immediately.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets (assets/index-<hash>.js/.css) are content-addressed and
    # immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # NEVER cache index.html: it references the current asset hashes, so a stale
    # copy is what makes a browser keep showing the old UI after a rebuild.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
