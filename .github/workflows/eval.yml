# RAG evaluation — run manually (it uses an LLM judge, so it costs a few cents and
# needs the OPENAI_API_KEY repo secret). Actions tab → "RAG eval" → Run workflow.
name: RAG eval

on:
  workflow_dispatch:

jobs:
  eval:
    name: Retrieval + Ragas metrics
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: documind
          POSTGRES_USER: documind
          POSTGRES_PASSWORD: documind
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U documind -d documind"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e libs/documind_contracts -e libs/documind_common
          pip install -r eval/requirements.txt

      - name: Enable pgvector extension
        run: python -c "import psycopg; psycopg.connect('postgresql://documind:documind@localhost:5432/documind', autocommit=True).execute('CREATE EXTENSION IF NOT EXISTS vector')"

      - name: Run eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTGRES_HOST: localhost
          VECTOR_COLLECTION: documind_eval
        run: python eval/run_eval.py --judge

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval/results/latest.json
