name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -e libs/documind_contracts -e libs/documind_common
          pip install -r services/gateway/requirements.txt
          pip install -r services/document-service/requirements.txt
          pip install -r services/query-service/requirements.txt

      - name: Lint (ruff)
        run: ruff check libs services eval

      - name: Tests
        run: |
          pytest -q libs/documind_common
          (cd services/document-service && pytest -q)
          (cd services/query-service && pytest -q)
          (cd services/gateway && pytest -q)

  frontend:
    name: Frontend (typecheck + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
