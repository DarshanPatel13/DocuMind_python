# DocuMind backend stack. Bring everything up with:
#
#     docker compose up -d
#
# Postgres 16 + pgvector, MongoDB, Kafka (KRaft, no ZooKeeper), and the
# FastAPI backend. For day-to-day development you can instead run only the
# infra here and start the API locally with uvicorn (see README).
services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: documind
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind
    ports:
      - "5432:5432"
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d   # enables the vector extension on first start
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documind -d documind"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  # The FastAPI backend. Commented out by default so `docker compose up -d`
  # gives you just the infra for local uvicorn development. Uncomment to run
  # the whole stack in containers.
  #
  # backend:
  #   build: .
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     mongodb:
  #       condition: service_started
  #     kafka:
  #       condition: service_started
  #   environment:
  #     OPENAI_API_KEY: ${OPENAI_API_KEY}
  #     POSTGRES_HOST: postgres
  #     MONGO_URI: mongodb://mongodb:27017
  #     KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  #     CORS_ORIGINS: http://localhost:5173
  #   ports:
  #     - "8000:8000"

volumes:
  pgdata:
  mongodata:
